global:
  scrape_interval: 10s # How frequent to scrap 
  scrape_timeout: 10s # How long until scrape requests timesout 
  evaluation_interval: 10s # How frequent to evaluate rules 

rule_files: ['rules/*.yml']
alerting:
  alertmanagers:
    - static_configs:
       - targets: ["alermanager:9093"]

scrape_configs:
  - job_name: "kafka"
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: 'kafka'
          tier: "Streaming"
  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ['minio:9000']
        labels:
          services: 'minio'
          tier: "storage"
  - job_name : "airflow"
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['airflow-apiserver:8080']
        labels:
          services: 'airflow-apiserver'
          tier: "Orchestration"